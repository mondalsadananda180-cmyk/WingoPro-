<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WinGo Gold | Official</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #090b0e; color: white; margin: 0; }
        .page { display: none; height: 100vh; width: 100%; }
        .active-page { display: flex !important; flex-direction: column; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="auth-page" class="page active-page justify-center p-6">
        <div class="text-center mb-10">
            <h1 class="text-4xl font-black text-yellow-500 italic">WIN-GO GOLD</h1>
        </div>
        <div class="bg-[#161a1e] rounded-[2.5rem] p-8 border border-gray-800">
            <div class="flex mb-8 bg-[#090b0e] p-1 rounded-2xl">
                <button onclick="switchAuth('login')" id="tab-login" class="flex-1 py-3 rounded-xl font-black text-xs bg-yellow-500 text-black">LOGIN</button>
                <button onclick="switchAuth('register')" id="tab-register" class="flex-1 py-3 rounded-xl font-black text-xs text-gray-500">REGISTER</button>
            </div>
            <div class="space-y-5">
                <input type="number" id="auth-mobile" class="w-full bg-[#090b0e] border border-gray-800 p-4 rounded-2xl text-white outline-none" placeholder="Mobile Number">
                <input type="password" id="auth-password" class="w-full bg-[#090b0e] border border-gray-800 p-4 rounded-2xl text-white outline-none" placeholder="Password">
                <button id="auth-confirm-btn" class="w-full bg-yellow-500 text-black font-black py-4 rounded-2xl uppercase">Confirm</button>
            </div>
        </div>
    </div>

    <div id="home-page" class="page">
        <header class="flex justify-between items-center px-6 py-5 bg-[#12161b] border-b border-white/5">
            <p class="text-sm font-black" id="display-user-id">ID: --</p>
            <button onclick="logout()" class="text-gray-500 text-xs font-bold underline">Logout</button>
        </header>
        <div class="flex-1 overflow-y-auto">
            <section class="m-5 bg-[#1a1f26] rounded-[2rem] p-7 shadow-2xl">
                <p class="text-[10px] text-gray-400 font-black uppercase mb-2">Wallet Balance</p>
                <div class="text-4xl font-black mb-8">₹ <span id="user-balance">0.00</span></div>
                <button onclick="navigateTo('game')" class="w-full bg-yellow-500 text-black font-black py-4 rounded-2xl uppercase">Play Now</button>
            </section>
        </div>
    </div>

    <div id="game-page" class="page">
        <header class="p-5 bg-[#12161b] flex items-center gap-4">
            <i class="fa-solid fa-arrow-left" onclick="navigateTo('home')"></i>
            <h2 class="font-black">WinGo 1M</h2>
        </header>
        <div class="flex-1 flex items-center justify-center">
            <h3 id="game-timer" class="text-6xl font-black text-yellow-500">00:00</h3>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAiFPc7w1rdbWfzgs5svUCCjy3wtZfFXRs",
            authDomain: "gold-ba06b.firebaseapp.com",
            projectId: "gold-ba06b",
            storageBucket: "gold-ba06b.firebasestorage.app",
            messagingSenderId: "706302744759",
            appId: "1:706302744759:web:7aed97ce243c97c27ad532"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let mode = 'login';
        window.switchAuth = (m) => {
            mode = m;
            document.getElementById('tab-login').className = m === 'login' ? "flex-1 py-3 rounded-xl font-black text-xs bg-yellow-500 text-black" : "flex-1 py-3 rounded-xl font-black text-xs text-gray-500";
            document.getElementById('tab-register').className = m === 'register' ? "flex-1 py-3 rounded-xl font-black text-xs bg-yellow-500 text-black" : "flex-1 py-3 rounded-xl font-black text-xs text-gray-500";
        };

        window.navigateTo = (id) => {
            document.querySelectorAll('.page').forEach(p => {
                p.classList.remove('active-page');
                p.style.display = 'none';
            });
            const target = document.getElementById(id + '-page');
            target.classList.add('active-page');
            target.style.display = 'flex';
        };

        document.getElementById('auth-confirm-btn').onclick = async () => {
            const mobile = document.getElementById('auth-mobile').value;
            const pass = document.getElementById('auth-password').value;
            if(!mobile || !pass) return alert("Fill all fields!");
            const email = mobile + "@wingogold.com";
            try {
                if(mode === 'register') {
                    const res = await createUserWithEmailAndPassword(auth, email, pass);
                    await setDoc(doc(db, "users", res.user.uid), { mobile, balance: 20.0 });
                } else {
                    await signInWithEmailAndPassword(auth, email, pass);
                }
            } catch (e) { alert(e.message); }
        };

        onAuthStateChanged(auth, (user) => {
            if(user) {
                document.getElementById('display-user-id').innerText = "ID: " + user.email.split('@')[0];
                onSnapshot(doc(db, "users", user.uid), (snap) => {
                    if(snap.exists()) document.getElementById('user-balance').innerText = snap.data().balance.toFixed(2);
                });
                navigateTo('home');
            } else { navigateTo('auth'); }
        });

        window.logout = () => signOut(auth);
        setInterval(() => {
            let s = 60 - new Date().getSeconds();
            document.getElementById('game-timer').innerText = `00:${s < 10 ? '0'+s : s}`;
        }, 1000);
    </script>
</body>
</html>
