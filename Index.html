<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WinGo Gold | Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f5f5f5; font-family: sans-serif; }
        .page { display: none; }
        .active-page { display: block !important; }
        .profile-header { background-color: #007bff; color: white; padding: 25px; border-radius: 5px; margin: 10px; position: relative; }
        .list-item { background: white; padding: 15px; border-bottom: 1px solid #eee; display: flex; align-items: center; gap: 12px; color: #444; font-size: 14px; }
        .footer-nav { background: white; border-top: 1px solid #ddd; position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; padding: 10px 0; }
        .footer-item { text-align: center; color: #888; font-size: 12px; }
        .footer-active { color: #007bff; }
    </style>
</head>
<body>

    <div id="auth-page" class="page active-page flex flex-col justify-center p-6 min-h-screen bg-gray-900">
         <h1 class="text-3xl font-bold text-yellow-500 text-center mb-8 italic">WIN-GO GOLD</h1>
         <div class="bg-gray-800 p-8 rounded-3xl space-y-4">
            <input type="number" id="auth-mobile" class="w-full p-4 rounded-xl bg-gray-700 text-white outline-none" placeholder="Mobile Number">
            <input type="password" id="auth-password" class="w-full p-4 rounded-xl bg-gray-700 text-white outline-none" placeholder="Password">
            <button id="auth-confirm-btn" class="w-full bg-yellow-500 p-4 rounded-xl font-bold text-black uppercase">Login / Register</button>
         </div>
    </div>

    <div id="home-page" class="page">
        <div class="profile-header">
            <div class="flex items-center gap-4">
                <div class="w-16 h-16 bg-green-500 rounded-full flex items-center justify-center text-white text-3xl">
                    <i class="fa-solid fa-user"></i>
                </div>
                <div>
                    <p class="font-bold text-lg">User:member_<span id="display-user-mobile">--</span></p>
                    <p class="text-sm opacity-90">ID: <span id="display-user-id">--</span></p>
                </div>
                <div class="absolute right-6 top-10">
                    <i class="fa-solid fa-bell text-xl"></i>
                </div>
            </div>
            <p class="mt-4 text-sm">Mobile: <span id="display-full-mobile">--</span></p>
            <p class="mt-2 text-lg font-bold">Available balance: ₹<span id="user-balance">0.00</span></p>
            
            <div class="flex gap-4 mt-4">
                <button class="bg-green-500 px-6 py-2 rounded font-bold text-sm">Recharge</button>
                <button class="bg-white text-gray-700 px-4 py-2 rounded font-bold text-sm">Change Nick Name</button>
            </div>
        </div>

        <div class="mt-2 mb-20">
            <div class="list-item"><i class="fa-solid fa-clipboard-list text-purple-500"></i> Bonus Record</div>
            <div class="list-item"><i class="fa-solid fa-gift text-purple-400"></i> Promotion</div>
            <div class="list-item flex justify-between">
                <div class="flex items-center gap-3"><i class="fa-solid fa-wallet text-purple-600"></i> Wallet</div>
                <i class="fa-solid fa-chevron-down text-xs text-gray-400"></i>
            </div>
            <div class="list-item"><i class="fa-solid fa-credit-card text-blue-400"></i> Bank Card</div>
            <div class="list-item"><i class="fa-solid fa-location-dot text-red-400"></i> Address</div>
            <div class="list-item flex justify-between">
                <div class="flex items-center gap-3"><i class="fa-solid fa-shield-halved text-blue-600"></i> Account Security</div>
                <i class="fa-solid fa-chevron-down text-xs text-gray-400"></i>
            </div>
            <div class="list-item flex justify-between">
                <div class="flex items-center gap-3"><i class="fa-solid fa-download text-blue-500"></i> App Download</div>
                <i class="fa-solid fa-chevron-down text-xs text-gray-400"></i>
            </div>
            
            <div class="p-4">
                <button onclick="logout()" class="w-full bg-gray-400 text-white py-3 rounded-lg font-bold text-lg">Logout</button>
            </div>
        </div>

        <div class="footer-nav">
            <div class="footer-item"><i class="fa-solid fa-house text-xl"></i><p>Home</p></div>
            <div class="footer-item"><i class="fa-solid fa-magnifying-glass text-xl"></i><p>Search</p></div>
            <div class="footer-item"><i class="fa-solid fa-crown text-xl"></i><p>NewGame</p></div>
            <div class="footer-item"><i class="fa-solid fa-chart-line text-xl"></i><p>Win</p></div>
            <div class="footer-item footer-active"><i class="fa-solid fa-user text-xl"></i><p>My</p></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAiFPc7w1rdbWfzgs5svUCCjy3wtZfFXRs",
            authDomain: "gold-ba06b.firebaseapp.com",
            projectId: "gold-ba06b",
            storageBucket: "gold-ba06b.firebasestorage.app",
            messagingSenderId: "706302744759",
            appId: "1:706302744759:web:7aed97ce243c97c27ad532"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        document.getElementById('auth-confirm-btn').onclick = async () => {
            const mobile = document.getElementById('auth-mobile').value;
            const pass = document.getElementById('auth-password').value;
            const email = mobile + "@wingogold.com";
            try {
                // Pehle login try karein, fail hua toh register
                try {
                    await signInWithEmailAndPassword(auth, email, pass);
                } catch {
                    const res = await createUserWithEmailAndPassword(auth, email, pass);
                    await setDoc(doc(db, "users", res.user.uid), { mobile, balance: 20.0, id: Math.floor(1000000 + Math.random() * 9000000) });
                }
            } catch (e) { alert(e.message); }
        };

        onAuthStateChanged(auth, (user) => {
            if(user) {
                const mobile = user.email.split('@')[0];
                document.getElementById('display-user-mobile').innerText = "+" + mobile;
                document.getElementById('display-full-mobile').innerText = "+" + mobile;
                
                onSnapshot(doc(db, "users", user.uid), (snap) => {
                    if(snap.exists()){
                        document.getElementById('user-balance').innerText = snap.data().balance.toFixed(2);
                        document.getElementById('display-user-id').innerText = snap.data().id || "1602499";
                    }
                });
                document.getElementById('auth-page').style.display = 'none';
                document.getElementById('home-page').style.display = 'block';
            } else {
                document.getElementById('auth-page').style.display = 'flex';
                document.getElementById('home-page').style.display = 'none';
            }
        });

        window.logout = () => signOut(auth);
    </script>
</body>
</html>
