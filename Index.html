we              <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WinGo Gold | Official</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f5f5f5; font-family: sans-serif; margin: 0; padding-bottom: 80px; }
        .page { display: none; }
        .active-page { display: block !important; }
        .profile-header { background-color: #007bff; color: white; padding: 25px; border-radius: 5px; margin: 10px; }
        .win-header { background-color: #007bff; color: white; padding: 20px; }
        .tab-bar { background: white; display: flex; justify-content: space-around; border-bottom: 2px solid #eee; }
        .tab-item { padding: 12px; font-weight: 600; color: #666; cursor: pointer; }
        .tab-active { color: #007bff; border-bottom: 3px solid #007bff; }
        .footer-nav { background: white; border-top: 1px solid #ddd; position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; padding: 10px 0; z-index: 100; }
        .footer-item { text-align: center; color: #888; font-size: 12px; cursor: pointer; }
        .footer-active { color: #007bff; }
        .btn-join { color: white; padding: 10px; border-radius: 5px; font-weight: bold; width: 32%; font-size: 14px; }
        .dot { height: 10px; width: 10px; border-radius: 50%; display: inline-block; }
        table { width: 100%; text-align: center; font-size: 13px; margin-top: 10px; }
        th { background: #f8f9fa; color: #888; padding: 10px; font-weight: normal; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

    <div id="auth-page" class="page active-page flex flex-col justify-center min-h-screen p-6 bg-gray-900">
        <h1 class="text-3xl font-black text-yellow-500 text-center mb-8 italic">WIN-GO GOLD</h1>
        <div class="bg-gray-800 p-8 rounded-3xl space-y-4">
            <input type="number" id="auth-mobile" class="w-full p-4 rounded-xl bg-gray-700 text-white outline-none" placeholder="Mobile Number">
            <input type="password" id="auth-password" class="w-full p-4 rounded-xl bg-gray-700 text-white outline-none" placeholder="Password">
            <button id="auth-confirm-btn" class="w-full bg-yellow-500 p-4 rounded-xl font-bold text-black uppercase">Login / Register</button>
        </div>
    </div>

    <div id="my-page" class="page">
        <div class="profile-header">
            <div class="flex items-center gap-4">
                <div class="w-16 h-16 bg-white/20 rounded-full flex items-center justify-center">
                    <i class="fa-solid fa-user text-3xl"></i>
                </div>
                <div>
                    <p class="font-bold text-lg">User:member_<span id="my-mobile">--</span></p>
                    <p class="text-sm opacity-90">ID: <span id="my-id">--</span></p>
                </div>
            </div>
            <p class="mt-4 text-xl font-extrabold italic">Available balance: ₹<span id="user-balance-my">0.00</span></p>
            <div class="flex gap-4 mt-4">
                <button class="bg-green-500 px-6 py-2 rounded font-bold text-sm">Recharge</button>
                <button class="bg-white text-gray-700 px-4 py-2 rounded font-bold text-sm">Change Nick Name</button>
            </div>
        </div>
        <div class="mt-2 px-2 bg-white">
            <div class="p-4 border-b flex items-center gap-3"><i class="fa-solid fa-wallet text-purple-600"></i> Wallet</div>
            <div class="p-4 border-b flex items-center gap-3"><i class="fa-solid fa-shield-halved text-blue-600"></i> Security</div>
            <div class="p-6"><button onclick="logout()" class="w-full bg-red-700 text-white py-3 rounded-xl font-bold">Logout</button></div>
        </div>
    </div>

    <div id="win-page" class="page">
        <div class="win-header">
            <p class="text-sm">Available balance: ₹<span id="user-balance-win">0.00</span></p>
            <div class="flex gap-3 mt-3">
                <button class="bg-green-600 px-5 py-2 rounded text-sm font-bold">Recharge</button>
                <button class="bg-white text-gray-700 px-5 py-2 rounded text-sm font-bold">Read Rule</button>
            </div>
        </div>
        <div class="tab-bar">
            <div class="tab-item tab-active" onclick="switchGameTab('Parity')">Parity</div>
            <div class="tab-item" onclick="switchGameTab('Sapre')">Sapre</div>
            <div class="tab-item" onclick="switchGameTab('Bcone')">Bcone</div>
            <div class="tab-item" onclick="switchGameTab('Emerd')">Emerd</div>
        </div>
        <div class="bg-white p-4 flex justify-between items-center border-b">
            <div>
                <p class="text-xs text-gray-500">Period</p>
                <h3 class="font-bold text-lg" id="p-num">20260330284</h3>
            </div>
            <div class="text-right">
                <p class="text-xs text-gray-500">Count Down</p>
                <h3 class="text-2xl font-black text-gray-800" id="countdown">00:00</h3>
            </div>
        </div>
        <div class="bg-white p-4 flex justify-between gap-1">
            <button onclick="placeBet('Green')" class="btn-join bg-green-500">Join Green</button>
            <button onclick="placeBet('Violet')" class="btn-join bg-purple-500">Join Violet</button>
            <button onclick="placeBet('Red')" class="btn-join bg-red-500">Join Red</button>
        </div>
        <div class="bg-white p-2">
            <div class="text-center font-bold text-gray-600 py-2"><span id="active-tab-name">Parity</span> Record</div>
            <table id="history-table">
                <thead><tr><th>Period</th><th>Price</th><th>Number</th><th>Result</th></tr></thead>
                <tbody id="history-body"></tbody>
            </table>
        </div>
    </div>

    <div class="footer-nav">
        <div class="footer-item" onclick="showPage('home')"><i class="fa-solid fa-house"></i><p>Home</p></div>
        <div class="footer-item" id="footer-win" onclick="showPage('win')"><i class="fa-solid fa-chart-line text-xl"></i><p>Win</p></div>
        <div class="footer-item footer-active" id="footer-my" onclick="showPage('my')"><i class="fa-solid fa-user text-xl"></i><p>My</p></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, updateDoc, increment, getDocs, collection, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAiFPc7w1rdbWfzgs5svUCCjy3wtZfFXRs",
            authDomain: "gold-ba06b.firebaseapp.com",
            projectId: "gold-ba06b",
            storageBucket: "gold-ba06b.firebasestorage.app",
            messagingSenderId: "706302744759",
            appId: "1:706302744759:web:7aed97ce243c97c27ad532"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let currentUserId = null;

        // NAVIGATION LOGIC
        window.showPage = (id) => {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.querySelectorAll('.footer-item').forEach(f => f.classList.remove('footer-active'));
            
            if(id === 'win') {
                document.getElementById('win-page').classList.add('active-page');
                document.getElementById('footer-win').classList.add('footer-active');
                refreshHistoryData(); // Har baar naya fake data load hoga
            } else if(id === 'my') {
                document.getElementById('my-page').classList.add('active-page');
                document.getElementById('footer-my').classList.add('footer-active');
            }
        };

        // TAB SWITCHING WITH FAKE DATA
        window.switchGameTab = (name) => {
            document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('tab-active'));
            event.target.classList.add('tab-active');
            document.getElementById('active-tab-name').innerText = name;
            refreshHistoryData(); 
        };

        function refreshHistoryData() {
            const body = document.getElementById('history-body');
            let html = '';
            for(let i=0; i<8; i++) {
                let num = Math.floor(Math.random() * 10);
                let color = (num % 2 === 0) ? '#ef4444' : '#22c55e';
                if(num === 0 || num === 5) color = '#a855f7';
                html += `<tr><td>20260330${283-i}</td><td>3${Math.floor(10000+Math.random()*9000)}</td><td style="color:${color}">${num}</td><td><span class="dot" style="background:${color}"></span></td></tr>`;
            }
            body.innerHTML = html;
        }

        // BETTING LOGIC (LOW AMOUNT WINS)
        window.placeBet = async (color) => {
            const amount = prompt(`Enter Bet Amount on ${color}:`, "10");
            if(amount >= 10) {
                await updateDoc(doc(db, "users", currentUserId), { balance: increment(-parseInt(amount)) });
                await setDoc(doc(db, "current_bets", Date.now().toString()), { selection: color, amount: parseInt(amount) });
                alert("Bet Placed Successfully!");
            }
        };

        async function calculateWinner() {
            const betsSnap = await getDocs(collection(db, "current_bets"));
            let pool = { Green: 0, Red: 0, Violet: 0 };
            betsSnap.forEach(d => { pool[d.data().selection] += d.data().amount; });
            const winColor = pool.Green <= pool.Red ? 'Green' : 'Red';
            refreshHistoryData(); // Update history UI
            const batchDelete = betsSnap.docs.map(d => deleteDoc(doc(db, "current_bets", d.id)));
            await Promise.all(batchDelete);
        }

        setInterval(() => {
            let sec = 60 - new Date().getSeconds();
            document.getElementById('countdown').innerText = `00:${sec < 10 ? '0'+sec : sec}`;
            if(sec === 1) calculateWinner();
        }, 1000);

        // AUTH & PROFILE
        document.getElementById('auth-confirm-btn').onclick = async () => {
            const m = document.getElementById('auth-mobile').value;
            const p = document.getElementById('auth-password').value;
            try {
                await signInWithEmailAndPassword(auth, m + "@wingo.com", p);
            } catch {
                const res = await createUserWithEmailAndPassword(auth, m + "@wingo.com", p);
                await setDoc(doc(db, "users", res.user.uid), { mobile: m, balance: 20, id: Math.floor(100000+Math.random()*900000) });
            }
        };

        onAuthStateChanged(auth, (user) => {
            if(user) {
                currentUserId = user.uid;
                onSnapshot(doc(db, "users", user.uid), (snap) => {
                    const d = snap.data();
                    document.getElementById('user-balance-my').innerText = d.balance.toFixed(2);
                    document.getElementById('user-balance-win').innerText = d.balance.toFixed(2);
                    document.getElementById('my-mobile').innerText = d.mobile;
                    document.getElementById('my-id').innerText = d.id;
                });
                showPage('my'); // Login ke baad My Page khulega
            }
        });

        window.logout = () => signOut(auth).then(() => location.reload());
    </script>
</body>
</html>
